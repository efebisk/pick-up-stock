<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemon — Puntos de Retiro</title>
    <link rel="icon" href="https://framerusercontent.com/images/oY7vruOorqAA7MnBcgpFi2BpIg.png">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

        body {
            font-family: 'Satoshi', -apple-system, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            -webkit-font-smoothing: antialiased;
        }

        .logo { margin-bottom: 48px }
        .logo svg { height: 32px }

        h1 {
            font-size: clamp(32px, 6vw, 56px);
            font-weight: 900;
            letter-spacing: -0.03em;
            line-height: 1.05;
            text-align: center;
            margin-bottom: 16px;
        }

        h1 .green { color: #00F068 }

        .subtitle {
            font-size: 17px;
            color: rgba(255,255,255,0.4);
            text-align: center;
            margin-bottom: 48px;
            max-width: 400px;
        }

        .countries {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .country-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 32px 48px;
            background: #171717;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            text-decoration: none;
            color: #fff;
            transition: all 0.2s ease;
            min-width: 200px;
        }

        .country-card:hover {
            border-color: rgba(0, 240, 104, 0.4);
            background: #1e1e1e;
            transform: translateY(-2px);
        }

        .flag {
            font-size: 48px;
            line-height: 1;
        }

        .country-name {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .country-status {
            font-size: 13px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .country-status.active {
            color: #00F068;
            background: rgba(0, 240, 104, 0.08);
            border: 1px solid rgba(0, 240, 104, 0.4);
        }

        .country-status.soon {
            color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
