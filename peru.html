<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemon — Puntos de Retiro</title>
    <link rel="icon" href="https://framerusercontent.com/images/oY7vruOorqAA7MnBcgpFi2BpIg.png">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

        :root {
            --green: #00F068;
            --green-dim: rgba(0, 240, 104, 0.08);
            --green-mid: rgba(0, 240, 104, 0.2);
            --green-border: rgba(0, 240, 104, 0.4);
            --green-glow: rgba(0, 240, 104, 0.15);
            --black: #000000;
            --surface-1: #171717;
            --surface-2: #1e1e1e;
            --surface-3: #3e3e3e;
            --white: #ffffff;
            --white-70: rgba(255, 255, 255, 0.7);
            --white-40: rgba(255, 255, 255, 0.4);
            --white-20: rgba(255, 255, 255, 0.2);
            --white-10: rgba(255, 255, 255, 0.1);
            --white-05: rgba(255, 255, 255, 0.05);
            --red: #FF4D6A;
            --red-dim: rgba(255, 77, 106, 0.12);
            --red-border: rgba(255, 77, 106, 0.3);
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-pill: 40px;
            --font: 'Satoshi', -apple-system, sans-serif;
        }

        html { scroll-behavior: smooth }

        body {
            font-family: var(--font);
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ---- Top Nav ---- */
        .topnav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--white-10);
        }

        .topnav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo svg {
            height: 28px;
            width: auto;
        }

        .logo-divider {
            width: 1px;
            height: 20px;
            background: var(--white-20);
        }

        .logo-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--white-70);
            letter-spacing: -0.01em;
        }

        .nav-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--green-dim);
            border: 1px solid var(--green-border);
            border-radius: var(--radius-pill);
            font-size: 13px;
            font-weight: 500;
            color: var(--green);
        }

        .nav-status .pulse {
            width: 6px;
            height: 6px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0, 240, 104, 0.4) }
            50% { opacity: 0.6; box-shadow: 0 0 0 4px rgba(0, 240, 104, 0) }
        }

        /* ---- Hero ---- */
        .hero {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 24px 56px;
            text-align: center;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: var(--white-05);
            border: 1px solid var(--white-10);
            border-radius: var(--radius-pill);
            font-size: 13px;
            font-weight: 500;
            color: var(--white-70);
            margin-bottom: 24px;
        }

        .hero h1 {
            font-size: clamp(36px, 7vw, 64px);
            font-weight: 900;
            letter-spacing: -0.03em;
            line-height: 1.05;
            margin-bottom: 20px;
        }

        .hero h1 .green {
            color: var(--green);
        }

        .hero p {
            font-size: 18px;
            color: var(--white-40);
            max-width: 480px;
            margin: 0 auto;
            line-height: 1.6;
            font-weight: 400;
        }

        /* ---- Store Grid ---- */
        .grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px 100px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr }
        }

        /* ---- Store Card ---- */
        .card {
            background: var(--surface-1);
            border: 1px solid var(--white-10);
            border-radius: var(--radius-lg);
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.5s ease forwards;
        }

        .card:nth-child(1) { animation-delay: 0.05s }
        .card:nth-child(2) { animation-delay: 0.1s }
        .card:nth-child(3) { animation-delay: 0.15s }
        .card:nth-child(4) { animation-delay: 0.2s }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0) }
        }

        .card-header {
            padding: 24px 24px 0;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
        }

        .card-name {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .card-ref {
            margin-top: 8px;
            font-size: 14px;
            color: var(--white-40);
            line-height: 1.4;
        }

        .card-distance {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--white-40);
        }

        .card.nearest {
            border-color: var(--green-border);
        }

        .nearest-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            font-weight: 700;
            color: var(--green);
            margin-top: 8px;
        }

        /* ---- Badge ---- */
        .badge {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: var(--radius-pill);
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .badge--loading {
            background: var(--white-05);
            border: 1px solid var(--white-10);
            color: var(--white-40);
        }

        .badge--loading .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid var(--white-20);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg) } }

        .badge--stock {
            background: var(--green-dim);
            border: 1px solid var(--green-border);
            color: var(--green);
        }

        .badge--stock .dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        .badge--nostock {
            background: var(--red-dim);
            border: 1px solid var(--red-border);
            color: var(--red);
        }

        /* ---- Card Content ---- */
        .card-content {
            padding: 20px 24px 24px;
        }

        /* ---- Hours ---- */
        .hours {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .hours-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .hours-days {
            color: var(--white-40);
            min-width: 100px;
        }

        .hours-time {
            font-size: 14px;
            font-weight: 500;
            color: var(--white-70);
        }

        .status-tag {
            margin-left: auto;
            font-size: 12px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: var(--radius-pill);
        }

        .status-tag.open {
            color: var(--green);
            background: var(--green-dim);
        }

        .status-tag.closed {
            color: var(--red);
            background: var(--red-dim);
        }

        /* ---- Separator ---- */
        .sep {
            height: 1px;
            background: var(--white-10);
            margin: 16px 0;
        }

        /* ---- Action Links ---- */
        .card-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .card-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: var(--white-05);
            border: 1px solid var(--white-10);
            border-radius: var(--radius-pill);
            color: var(--white-70);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .card-link:hover {
            background: var(--white-10);
            border-color: var(--white-20);
            color: var(--white);
        }

        .card-link svg {
            flex-shrink: 0;
        }

        .card-link--video {
            background: var(--red-dim);
            border-color: var(--red-border);
            color: var(--red);
        }

        .card-link--video:hover {
            background: rgba(255, 77, 106, 0.2);
            color: var(--red);
        }

        /* ---- Footer ---- */
        .footer {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
            border-top: 1px solid var(--white-10);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--white-40);
        }

        .footer-left svg {
            height: 18px;
            opacity: 0.4;
        }

        .footer-right a {
            font-size: 13px;
            color: var(--white-40);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-right a:hover {
            color: var(--green);
        }

        /* ---- Responsive ---- */
        @media (max-width: 560px) {
            .hero { padding: 48px 20px 36px }
            .hero h1 { letter-spacing: -0.02em }
            .hero p { font-size: 16px }
            .card-header { flex-direction: column; gap: 12px }
            .badge { align-self: flex-start }
            .topnav-inner { padding: 14px 20px }
            .nav-status span:not(.pulse) { display: none }
            .nav-status { padding: 8px 10px }
            .grid { padding: 0 16px 80px; gap: 12px }
            .card-content { padding: 16px 20px 20px }
            .card-header { padding: 20px 20px 0 }
            .footer { padding: 24px 20px; flex-direction: column; text-align: center }
        }
    </style>
</head>

<script>
// ============================================================
//  STORE DATA
// ============================================================
const STORES = [
    {
        id: "megaplaza-independencia",
        name: "MegaPlaza Independencia",
        location: "Al costado del bicicletero — paralela a Calle A",
        lat: -11.9942, lng: -77.0585,
        hours: [
            { days: "Lun — Sáb", time: "10:00 – 20:00" },
            { days: "Dom", time: "10:00 – 19:00" }
        ],
        videoUrl: "https://www.youtube.com/watch?v=LdybZdUSBY8",
        maps: "https://www.google.com/maps/search/?api=1&query=MegaPlaza+Independencia+Lima+Peru"
    },
    {
        id: "megaplaza-chorrillos",
        name: "MegaPlaza Chorrillos",
        location: "Primer Piso al frente de MiFarma",
        lat: -12.1975, lng: -76.9989,
        hours: [
            { days: "Lun — Sáb", time: "10:00 – 20:00" },
            { days: "Dom", time: "10:00 – 19:00" }
        ],
        videoUrl: null,
        maps: "https://www.google.com/maps/search/?api=1&query=MegaPlaza+Express+Chorrillos+Lima+Peru"
    },
    {
        id: "parque-la-molina",
        name: "Parque La Molina",
        location: "Estacionamiento Nivel -3",
        lat: -12.0769, lng: -76.9428,
        hours: [
            { days: "Dom — Lun", time: "10:00 – 18:00" },
            { days: "Mar — Sáb", time: "10:00 – 20:00" }
        ],
        videoUrl: null,
        maps: "https://www.google.com/maps/search/?api=1&query=Parque+La+Molina+Lima+Peru"
    },
    {
        id: "larcomar",
        name: "Larcomar",
        location: "Nivel A del estacionamiento",
        lat: -12.1316, lng: -77.0299,
        hours: [
            { days: "Dom — Lun", time: "10:00 – 18:00" },
            { days: "Mar — Sáb", time: "10:00 – 20:00" }
        ],
        videoUrl: null,
        maps: "https://www.google.com/maps/search/?api=1&query=Larcomar+Miraflores+Lima+Peru"
    }
];

// ============================================================
//  RENDER
// ============================================================
const grid = document.getElementById('store-grid');

function isOpenNow(store) {
    const now = new Date();
    const day = now.getDay(); // 0=Sun
    const minutes = now.getHours() * 60 + now.getMinutes();
    const localOffset = now.getTimezoneOffset();

    for (const h of store.hours) {
        const daysStr = h.days.toLowerCase();
        const dayNames = ['dom','lun','mar','mié','jue','vie','sáb'];
        const todayName = dayNames[day];

        let match = false;
        if (daysStr.includes('—')) {
            const [start, end] = daysStr.split('—').map(s => s.trim());
            const si = dayNames.indexOf(start);
            const ei = dayNames.indexOf(end);
            if (si <= ei) match = day >= si && day <= ei;
            else match = day >= si || day <= ei;
        } else {
            match = daysStr.includes(todayName);
        }

        if (match) {
            const [open, close] = h.time.split('–').map(t => {
                const [hh, mm] = t.trim().split(':').map(Number);
                return hh * 60 + mm;
            });
            // Peru is UTC-5
            const peruNow = ((minutes + localOffset - 300) % 1440 + 1440) % 1440;
            return peruNow >= open && peruNow < close;
        }
    }
    return false;
}

function renderStores() {
    grid.innerHTML = STORES.map(store => {
        const open = isOpenNow(store);

        const videoLink = store.videoUrl
            ? `<a class="card-link card-link--video" href="${store.videoUrl}" target="_blank" rel="noopener">
                   <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                   Ver video de cómo llegar
               </a>`
            : '';

        return `
        <article class="card" data-store-id="${store.id}">
            <div class="card-header">
                <div>
                    <div class="card-name">${store.name}</div>
                    <div class="card-ref">${store.location}</div>
                    <div class="card-distance" data-distance="${store.id}"></div>
                </div>
                <div class="badge badge--loading" data-badge="${store.id}">
                    <div class="spinner"></div>
                    Consultando…
                </div>
            </div>
            <div class="card-content">
                <div class="hours">
                    ${store.hours.map((h, i) => `
                        <div class="hours-row">
                            <span class="hours-days">${h.days}</span>
                            <span class="hours-time">${h.time}</span>
                            ${i === 0 ? `<span class="status-tag ${open ? 'open' : 'closed'}">${open ? 'Abierto' : 'Cerrado'}</span>` : ''}
                        </div>
                    `).join('')}
                </div>
                <div class="card-links">
                    <a class="card-link" href="${store.maps}" target="_blank" rel="noopener">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                        Cómo llegar
                    </a>
                    ${videoLink}
                </div>
            </div>
        </article>`;
    }).join('');
}

// ============================================================
//  STOCK — Loads from Google Sheets (published as CSV)
//
//  Sheet columns: bodega | disponible
//  Values for "disponible": si / no
//
//  To connect: replace SHEET_ID below with your Google Sheet ID
//  and publish the sheet (File > Share > Publish to web > CSV)
// ============================================================

const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQdg5H0Nc1bN3Y23YDBiRz7x2FSbI9mLJ1cPiWxuu6g5uNhRrruGo7e6OG8asMPDVRQHVsfERyUUMFj/pub?gid=0&single=true&output=csv';

const BODEGA_MAP = {
    'chorrillos': 'megaplaza-chorrillos',
    'independencia': 'megaplaza-independencia',
    'larcomar': 'larcomar',
    'la molina': 'parque-la-molina'
};

function parseCSV(text) {
    const lines = text.trim().split('\n');

    function splitRow(line) {
        const fields = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (ch === '"') { inQuotes = !inQuotes; continue; }
            if (ch === ',' && !inQuotes) { fields.push(current.trim()); current = ''; continue; }
            current += ch;
        }
        fields.push(current.trim());
        return fields;
    }

    const headers = splitRow(lines[0]).map(h => h.toLowerCase());
    return lines.slice(1).filter(l => l.trim()).map(line => {
        const values = splitRow(line);
        const obj = {};
        headers.forEach((h, i) => obj[h] = values[i] || '');
        return obj;
    });
}

async function fetchStock() {
    try {
        const res = await fetch(SHEET_URL);
        const csv = await res.text();
        const rows = parseCSV(csv);

        for (const row of rows) {
            const pickup = (row['pick up'] || '').toLowerCase();
            const storeId = BODEGA_MAP[pickup];
            if (!storeId) continue;

            const stock = (row.stock || '').toLowerCase();
            const hasStock = stock === 'si' || stock === 'sí';
            updateBadge(storeId, hasStock ? 1 : 0);
        }
    } catch (err) {
        console.error('Error fetching stock:', err);
        STORES.forEach(s => {
            const badge = document.querySelector(`[data-badge="${s.id}"]`);
            if (badge) {
                badge.classList.remove('badge--loading');
                badge.className = 'badge badge--nostock';
                badge.innerHTML = 'Sin datos';
            }
        });
    }
}

function updateBadge(storeId, stockCount) {
    const badge = document.querySelector(`[data-badge="${storeId}"]`);
    if (!badge) return;

    badge.classList.remove('badge--loading', 'badge--stock', 'badge--nostock');

    if (stockCount > 0) {
        badge.classList.add('badge--stock');
        badge.innerHTML = '<span class="dot"></span> Hay disponibilidad';
    } else {
        badge.classList.add('badge--nostock');
        badge.innerHTML = 'Sin stock';
    }
}

// ============================================================
//  GEOLOCATION — Sort by nearest
// ============================================================

function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371; // km
    const toRad = d => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLng = toRad(lng2 - lng1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function applyGeolocation(pos) {
    const { latitude, longitude } = pos.coords;

    // Calculate distances
    const withDist = STORES.map(s => ({
        ...s,
        dist: haversine(latitude, longitude, s.lat, s.lng)
    })).sort((a, b) => a.dist - b.dist);

    // Reorder cards in the DOM
    withDist.forEach((s, i) => {
        const card = document.querySelector(`[data-store-id="${s.id}"]`);
        if (!card) return;
        card.style.order = i;

        // Show distance
        const distEl = card.querySelector(`[data-distance="${s.id}"]`);
        if (distEl) {
            const km = s.dist;
            const label = km < 1 ? `${Math.round(km * 1000)} m` : `${km.toFixed(1)} km`;
            distEl.textContent = `a ${label}`;
        }

        // Mark nearest
        if (i === 0) {
            card.classList.add('nearest');
            const distEl2 = card.querySelector(`[data-distance="${s.id}"]`);
            if (distEl2) {
                distEl2.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> Más cercano — a ${s.dist < 1 ? Math.round(s.dist * 1000) + ' m' : s.dist.toFixed(1) + ' km'}`;
                distEl2.className = 'nearest-tag';
            }
        }
    });

    // Make grid use flex order
    grid.style.display = 'grid';
}

function requestLocation() {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(applyGeolocation, () => {
        // User denied or error — just show default order, no action needed
    });
}

// ============================================================
//  INIT
// ============================================================
renderStores();
fetchStock();
requestLocation();
setInterval(fetchStock, 5 * 60 * 1000);
</script>
